      retries: 5
      start_period: 120s
    cpus: "0.25"
    mem_limit: "128m"
    pids_limit: 256

  adguard-proxy-frankfurt:
    build: ./vpn-proxy
    container_name: adguard-proxy-frankfurt
    restart: unless-stopped
    init: true
    cap_add:
      - NET_ADMIN
    env_file:
      - ./config/adguard-proxy-frankfurt.env
    environment:
      - VPN_WAIT_TIMEOUT=60
      - VPN_BOOT_MAX_ATTEMPTS=5
      - VPN_RETRY_DELAY=10
    volumes:
      - ./certs/comodo_frankfurt.crt:/etc/ipsec.d/cacerts/comodo.crt:ro
      - ./certs/ZeroSSLRSADVSSLCA2.crt:/etc/ipsec.d/cacerts/zerossl_rsa_dv_ssl_ca_2.crt:ro
      - ./certs/SectigoPublicServerAuthenticationRootR46.crt:/etc/ipsec.d/cacerts/sectigo_root_r46.crt:ro
    networks:
      vpn-net:
        ipv4_address: 172.22.250.6
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --max-time 3 http://localhost:8888 >/dev/null 2>&1 && ipsec status | grep -q ESTABLISHED"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 120s
    cpus: "0.25"
    mem_limit: "128m"
    pids_limit: 256

  aiostreams:
    image: ghcr.io/viren070/aiostreams:latest
    container_name: aiostreams
    restart: unless-stopped
    env_file:
      - ./config/aiostreams.env
    volumes:
      - ./data:/app/data
    networks:
      - web
      - vpn-net  # <-- join the VPN network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.aiostreams.rule=Host(`aiostreams.mrdouglas.uk`)"
      - "traefik.http.routers.aiostreams.entrypoints=websecure"
      - "traefik.http.services.aiostreams.loadbalancer.server.port=3000"
      - "traefik.http.routers.aiostreams.tls=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on: # <-- MODIFIED SECTION
      traefik:
        condition: service_healthy
      adguard-proxy-helsinki:
        condition: service_healthy
    cpus: "1.00"
    mem_limit: "768m"
    pids_limit: 512

  aiometadata_redis:
    image: redis:latest
    container_name: aiometadata_redis
    restart: unless-stopped
    volumes:
      - ./aiometadata/cache:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "0.50"
    mem_limit: "256m"
    pids_limit: 256

  aiometadata:
    image: ghcr.io/cedya77/aiometadata:latest
    container_name: aiometadata
    restart: unless-stopped
    env_file:
      - ./config/aiometadata.env
    expose:
      - "3232"
    volumes:
      - ./aiometadata/data:/app/addon/data
    networks:
      - default
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.aiometadata.rule=Host(`aiometadata.mrdouglas.uk`)"
      - "traefik.http.routers.aiometadata.entrypoints=websecure"
      - "traefik.http.routers.aiometadata.tls=true"
      - "traefik.http.services.aiometadata.loadbalancer.server.port=3232"
    depends_on:
      aiometadata_redis:
        condition: service_healthy
      traefik:
        condition: service_healthy
    tty: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3232/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    cpus: "1.00"
    mem_limit: "768m"
    pids_limit: 512

