      - VPN_RETRY_DELAY=10
    volumes:
      - ./certs/comodo_london.crt:/etc/ipsec.d/cacerts/comodo.crt:ro
      - ./certs/ZeroSSLRSADVSSLCA2.crt:/etc/ipsec.d/cacerts/zerossl_rsa_dv_ssl_ca_2.crt:ro
      - ./certs/SectigoPublicServerAuthenticationRootR46.crt:/etc/ipsec.d/cacerts/sectigo_root_r46.crt:ro
    networks:
      vpn-net:
        ipv4_address: 172.22.250.4
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --max-time 3 http://localhost:8888 >/dev/null 2>&1 && ipsec status | grep -q ESTABLISHED"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 120s
    cpus: "0.25"
    mem_limit: "128m"
    pids_limit: 256

  adguard-proxy-nyc:
    build: ./vpn-proxy
    container_name: adguard-proxy-nyc
    restart: unless-stopped
    init: true
    cap_add:
      - NET_ADMIN
    env_file:
      - ./config/adguard-proxy-nyc.env
    environment:
      - VPN_WAIT_TIMEOUT=60
      - VPN_BOOT_MAX_ATTEMPTS=5
      - VPN_RETRY_DELAY=10
