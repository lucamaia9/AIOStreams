services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=comet
      - POSTGRES_PASSWORD=comet
      - POSTGRES_DB=comet
      - TZ=Europe/London
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comet -d comet"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    cpus: "1.00"
    mem_limit: "512m"
    pids_limit: 256

  bitmagnet-postgres:
    image: postgres:16-alpine
    container_name: bitmagnet-postgres
    profiles: ["bitmagnet"]
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
      - TZ=Europe/London
    volumes:
      - ./bitmagnet-media/runtime/postgres:/var/lib/postgresql/data
    networks:
      - vpn-net
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    cpus: "1.00"
    mem_limit: "1024m"
    pids_limit: 256

  bitmagnet:
    image: bitmagnetico-local:latest
    build:
      context: ./bitmagnet-media
      dockerfile: Dockerfile
    container_name: bitmagnet
    profiles: ["bitmagnet"]
    restart: unless-stopped
    env_file:
      - ./config/bitmagnet.env
    command:
      - worker
      - run
      - --keys=http_server,queue_server,dht_crawler
    volumes:
      - ./bitmagnet-media/runtime/config:/root/.config/bitmagnet
      - ./bitmagnet-media/runtime/data:/root/.local/share/bitmagnet
      - ./bitmagnet-media/classifier:/opt/bitmagnetico/tools:ro
      - ./scripts:/opt/bitmagnetico/scripts:ro
      - ./data/comet-fresh/magnetico/active.search.sqlite3:/data/canonical.sqlite3:ro
      - ./data/tmdb:/opt/data/tmdb
    networks:
      - vpn-net
    ports:
      - "3333:3333/tcp"
      - "3334:3334/tcp"
      - "3334:3334/udp"
    depends_on:
      bitmagnet-postgres:
        condition: service_healthy
    cpus: "1.00"
    mem_limit: "1536m"
    pids_limit: 512

  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    environment:
      - TZ=Europe/London
    ports:
      - "80:80"
      - "443:443"
    command:
      - '--ping=true'
      - '--log.level=INFO'
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/config"
      - "--providers.file.watch=true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik:/config"
    networks:
      - web
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    cpus: "0.50"
    mem_limit: "256m"
    pids_limit: 256

  adguard-proxy-helsinki:
    build: ./vpn-proxy
    container_name: adguard-proxy-helsinki
    restart: unless-stopped
    init: true
    cap_add:
      - NET_ADMIN
    env_file:
      - ./config/adguard-proxy-helsinki.env
    environment:
      - VPN_WAIT_TIMEOUT=60
      - VPN_BOOT_MAX_ATTEMPTS=5
      - VPN_RETRY_DELAY=10
    volumes:
      - ./certs/comodo_helsinki.crt:/etc/ipsec.d/cacerts/comodo.crt:ro
      - ./certs/ZeroSSLRSADVSSLCA2.crt:/etc/ipsec.d/cacerts/zerossl_rsa_dv_ssl_ca_2.crt:ro
      - ./certs/SectigoPublicServerAuthenticationRootR46.crt:/etc/ipsec.d/cacerts/sectigo_root_r46.crt:ro
    networks:
      vpn-net:
        ipv4_address: 172.22.250.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --max-time 3 http://localhost:8888 >/dev/null 2>&1 && ipsec status | grep -q ESTABLISHED"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 120s
    cpus: "0.25"
    mem_limit: "128m"
    pids_limit: 256

  adguard-proxy-amsterdam:
    build: ./vpn-proxy
    container_name: adguard-proxy-amsterdam
    restart: unless-stopped
    init: true
    cap_add:
      - NET_ADMIN
    env_file:
      - ./config/adguard-proxy-amsterdam.env
    environment:
      - VPN_WAIT_TIMEOUT=60
      - VPN_BOOT_MAX_ATTEMPTS=5
      - VPN_RETRY_DELAY=10
    volumes:
      - ./certs/comodo_amsterdam.crt:/etc/ipsec.d/cacerts/comodo.crt:ro
      - ./certs/ZeroSSLRSADVSSLCA2.crt:/etc/ipsec.d/cacerts/zerossl_rsa_dv_ssl_ca_2.crt:ro
      - ./certs/SectigoPublicServerAuthenticationRootR46.crt:/etc/ipsec.d/cacerts/sectigo_root_r46.crt:ro
    networks:
      vpn-net:
        ipv4_address: 172.22.250.3
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --max-time 3 http://localhost:8888 >/dev/null 2>&1 && ipsec status | grep -q ESTABLISHED"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 120s
    cpus: "0.25"
    mem_limit: "128m"
    pids_limit: 256

