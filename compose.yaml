  iptv-addon:
    build:
      context: ./iptv-addon
      dockerfile: Dockerfile
    container_name: iptv-addon
    restart: unless-stopped
    env_file:
      - ./config/iptv-addon.env
    volumes:
      - ./iptv-aggregator/output:/app/iptv-aggregator-output:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.iptv-addon.rule=Host(`iptv.mrdouglas.uk`)"
      - "traefik.http.routers.iptv-addon.entrypoints=websecure"
      - "traefik.http.routers.iptv-addon.tls=true"
      - "traefik.http.services.iptv-addon.loadbalancer.server.port=7000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    cpus: "0.50"
    mem_limit: "256m"
    pids_limit: 256
    depends_on:
      traefik:
        condition: service_healthy

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - AUTO_UPDATE=true
    volumes:
      - ./jackett/data:/config
      - ./jackett/blackhole:/downloads
      - ./jackett/data/cardigann/definitions/eztv.yml:/app/Jackett/Definitions/eztv.yml:ro
    networks:
      - web
      - vpn-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.jackett.rule=Host(`jackett.mrdouglas.uk`)"
      - "traefik.http.routers.jackett.entrypoints=websecure"
      - "traefik.http.routers.jackett.tls=true"
      - "traefik.http.services.jackett.loadbalancer.server.port=9117"
    depends_on:
      - flaresolverr-jackett
    cpus: "1.00"
    mem_limit: "384m"
    pids_limit: 384

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    init: true
    environment:
    - LOG_LEVEL=info
    - LOG_HTML=false
    - CAPTCHA_SOLVER=none
    - TZ=Europe/London
    - DISABLE_MEDIA=true
    - PROMETHEUS_ENABLED=true
    - NO_PROXY=localhost,127.0.0.1,jackett,flaresolverr,flaresolverr-jackett,flaresolverr-prowlarr,flaresolverr-helsinki,prowlarr,comet,aiostreams
    - no_proxy=localhost,127.0.0.1,jackett,flaresolverr,flaresolverr-jackett,flaresolverr-prowlarr,flaresolverr-helsinki,prowlarr,comet,aiostreams
    networks:
      - vpn-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    cpus: "1.00"
    mem_limit: "768m"
    memswap_limit: "768m"
    pids_limit: 384

  flaresolverr-rent:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr-rent
    init: true
    environment:
    - LOG_LEVEL=info
    - LOG_HTML=false
    - CAPTCHA_SOLVER=none
    - TZ=Europe/London
    - DISABLE_MEDIA=true
    - PROMETHEUS_ENABLED=true
    networks:
