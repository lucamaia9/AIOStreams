      - ./certs/ZeroSSLRSADVSSLCA2.crt:/etc/ipsec.d/cacerts/ZeroSSLRSADVSSLCA2.crt:ro
      - ./certs/SectigoPublicServerAuthenticationRootR46.crt:/etc/ipsec.d/cacerts/SectigoPublicServerAuthenticationRootR46.crt:ro
    networks:
      vpn-net:
        ipv4_address: 172.22.250.5
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --max-time 3 http://localhost:8888 >/dev/null 2>&1 && ipsec status | grep -q ESTABLISHED"]
      interval: 30s
