    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - ./data/flaresolverr-patches/sessions.py:/app/sessions.py:ro
    shm_size: "64m"
    cpus: "1.00"
    mem_limit: "1536m"
    memswap_limit: "1536m"
    pids_limit: 512

  flaresolverr-jackett:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr-jackett
    init: true
    environment:
    - LOG_LEVEL=info
    - LOG_HTML=false
    - CAPTCHA_SOLVER=none
    - TZ=Europe/London
    - DISABLE_MEDIA=true
    networks:
      - vpn-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    shm_size: "64m"
    cpus: "1.00"
    mem_limit: "768m"
    memswap_limit: "768m"
    pids_limit: 384

  flaresolverr-prowlarr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr-prowlarr
    init: true
    environment:
    - LOG_LEVEL=info
    - LOG_HTML=false
    - CAPTCHA_SOLVER=none
    - TZ=Europe/London
    - DISABLE_MEDIA=true
    - HTTP_PROXY=http://adguard-proxy-amsterdam:8888
    - HTTPS_PROXY=http://adguard-proxy-amsterdam:8888
    - NO_PROXY=localhost,127.0.0.1,prowlarr,flaresolverr,flaresolverr-jackett,flaresolverr-prowlarr,flaresolverr-helsinki,adguard-proxy-amsterdam
    - no_proxy=localhost,127.0.0.1,prowlarr,flaresolverr,flaresolverr-jackett,flaresolverr-prowlarr,flaresolverr-helsinki,adguard-proxy-amsterdam
    networks:
      - vpn-net
    restart: unless-stopped
    depends_on:
      adguard-proxy-amsterdam:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    shm_size: "64m"
    cpus: "1.00"
    mem_limit: "768m"
    memswap_limit: "768m"
    pids_limit: 384

  flaresolverr-helsinki:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr-helsinki
    init: true
    environment:
    - LOG_LEVEL=info
    - LOG_HTML=false
    - CAPTCHA_SOLVER=none
    - TZ=Europe/London
    - DISABLE_MEDIA=true
    - HTTP_PROXY=http://adguard-proxy-helsinki:8888
    - HTTPS_PROXY=http://adguard-proxy-helsinki:8888
    - NO_PROXY=localhost,127.0.0.1,prowlarr,flaresolverr,flaresolverr-prowlarr,flaresolverr-helsinki,adguard-proxy-helsinki
    - no_proxy=localhost,127.0.0.1,prowlarr,flaresolverr,flaresolverr-prowlarr,flaresolverr-helsinki,adguard-proxy-helsinki
    networks:
      - vpn-net
    restart: unless-stopped
    depends_on:
      adguard-proxy-helsinki:
