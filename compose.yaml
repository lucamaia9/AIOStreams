  #     - "traefik.http.routers.comet-prowlarr.rule=Host(`cometouglas2.duckdns.org`)"
  #     - "traefik.http.routers.comet-prowlarr.entrypoints=websecure"
  #     - "traefik.http.routers.comet-prowlarr.tls.certresolver=letsencrypt"
  #     - "traefik.http.services.comet-prowlarr.loadbalancer.server.port=8000"
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 20s
  #   depends_on:
  #     traefik:
  #       condition: service_healthy
  #     prowlarr:
  #       condition: service_started  

  comet:
    build:
      context: ./cometouglas
      dockerfile: Dockerfile
    container_name: comet
    restart: unless-stopped
    env_file:
      - ./config/comet-fresh.env
    volumes:
      - ./data/comet-fresh:/app/data
    networks:
      - web
      - vpn-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.comet.rule=Host(`comet.mrdouglas.uk`)"
      - "traefik.http.routers.comet.entrypoints=websecure"
      - "traefik.http.routers.comet.tls=true"
      - "traefik.http.services.comet.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_healthy
      jackett:
        condition: service_started
      prowlarr:
        condition: service_started
    cpus: "1.50"
    mem_limit: "768m"
    pids_limit: 512

  comet-builder:
    build:
      context: ./cometouglas
      dockerfile: Dockerfile
    container_name: comet-builder
    restart: unless-stopped
    env_file:
      - ./config/comet-builder.env
    volumes:
      - ./data/comet-fresh:/app/data
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      jackett:
        condition: service_started
      prowlarr:
        condition: service_started
    cpus: "1.00"
    mem_limit: "768m"
    pids_limit: 512

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - NO_PROXY=localhost,127.0.0.1,jackett,flaresolverr,flaresolverr-jackett,flaresolverr-helsinki,prowlarr,comet,aiostreams
      - no_proxy=localhost,127.0.0.1,jackett,flaresolverr,flaresolverr-jackett,flaresolverr-helsinki,prowlarr,comet,aiostreams
    volumes:
      - ./prowlarr/config:/config
    networks:
      - web
      - vpn-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.mrdouglas.uk`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    restart: unless-stopped
    depends_on:
      - flaresolverr-prowlarr
    cpus: "1.00"
    mem_limit: "384m"
    pids_limit: 384

  # iptv-aggregator: Canonical upstream-based wrapper. Runs on-demand with:
  # docker compose --profile iptv-aggregator run --rm iptv-aggregator
  iptv-aggregator:
    build:
      context: ./iptv-aggregator
      dockerfile: Dockerfile
    container_name: iptv-aggregator
    profiles: ["iptv-aggregator"]
    restart: "no"
    volumes:
      - ./iptv-aggregator/config:/app/config
      - ./iptv-aggregator/output:/app/output
    environment:
      - NODE_ENV=production
    cpus: "1.00"
    mem_limit: "1024m"

networks:
  web:
    external: true
  vpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
          gateway: 172.22.0.1
