caps:
  categories:
    1: TV

  modes:
    search: [q]
    tv-search: [q, season, ep]

settings:
  - name: info_flaresolverr
    type: info_flaresolverr

download:
  selectors:
    - selector: 'a[href^="magnet:?xt="]'
      attribute: href
    - selector: 'a[title="Download Torrent"]'
      attribute: href

search:
  paths:
    - path: "{{ if .Keywords }}search/{{ .Keywords }}{{ else }}home{{ end }}"

  keywordsfilters:
    - name: re_replace
      args: ["\\bS\\d{2,3}\\b", ""]
    - name: trim
    - name: replace
      args: ["-", ""]
    - name: replace
      args: [" ", "-"]
    - name: replace
      args: ["&", ""]

  headers:
    cookie: ["sort_no=100; q_filter=all; q_filter_web=on; q_filter_reality=on; q_filter_x265=on; layout=def_wlinks"]

  rows:
    selector: "table.forum_header_border:contains('Releases') tr[name='hover'].forum_header_border"
    filters:
      - name: andmatch

  fields:
    category:
      text: 1
    title:
      selector: td:nth-child(2) a.epinfo, td:nth-child(2) a
      attribute: title
      filters:
        - name: replace
          args: ["[eztv]", ""]
        - name: re_replace
          args: ["\\(.*\\)$", ""]
        - name: trim
    details:
      selector: td:nth-child(2) a.epinfo, td:nth-child(2) a
      attribute: href
    download:
      selector: td:nth-child(2) a.epinfo, td:nth-child(2) a
      attribute: href
    size:
      selector: td:nth-child(4)
      optional: true
      default: 512 MB
    date:
      selector: td:nth-child(5)
      filters:
        - name: append
          args: " ago"
    seeders:
      selector: td:nth-child(6)
    leechers:
      text: 0
    downloadvolumefactor:
      text: 0
    uploadvolumefactor:
      text: 1
