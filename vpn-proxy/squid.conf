# Listen on all interfaces on port 8888
http_port 0.0.0.0:8888
dns_nameservers 127.0.0.11

# --- Performance Settings for Squid 5 ---
server_persistent_connections on
client_persistent_connections on
pconn_timeout 120 seconds
# Use one worker process for stable startup/runtime in this container.
workers 1

# --- Original ACLs ---
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Allow all connections
acl localhost src 127.0.0.1/32 ::1
acl vpn_clients src 172.22.0.0/16

http_access allow localhost
http_access allow vpn_clients
http_access deny all

# --- Original Misc Settings ---
coredump_dir /var/spool/squid
logfile_rotate 5
cache_store_log none
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
